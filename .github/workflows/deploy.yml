name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck — server
        run: pnpm typecheck
        working-directory: server

      - name: Typecheck — web
        run: pnpm typecheck
        working-directory: web

      - name: Typecheck — admin
        run: pnpm typecheck
        working-directory: admin

      - name: Build — web
        run: pnpm build
        working-directory: web

      - name: Build — admin
        run: pnpm build
        working-directory: admin

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/portfolio

            echo "→ Pulling latest code"
            git pull origin main

            echo "→ Backing up database"
            docker compose exec -T server bun run server/scripts/backup-db.ts || \
              cp -f ~/apps/portfolio/server/data/app.db \
                    ~/apps/portfolio/server/data/app.db.bak.$(date +%Y%m%d_%H%M%S) 2>/dev/null || \
              echo "Backup skipped (no existing container or db)"

            echo "→ Restarting containers"
            docker compose down
            docker compose up -d --build

            echo "→ Running migrations"
            docker compose exec -T server bun run drizzle-kit migrate

            echo "→ Smoke test"
            sleep 5
            curl -sf http://localhost:3003/api/health || (echo "Health check failed" && exit 1)

            echo "✓ Deploy complete"
