name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck — server
        run: bun run typecheck
        working-directory: server

      - name: Typecheck — web
        run: bun run typecheck
        working-directory: web

      - name: Typecheck — admin
        run: bun run typecheck
        working-directory: admin

      - name: Build — server
        run: bun run build
        working-directory: server

      - name: Build — web
        run: bun run build
        working-directory: web

      - name: Build — admin
        run: bun run build
        working-directory: admin

      - name: Test — shared/markdown
        run: bun test
        working-directory: shared/markdown

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/portfolio

            echo "→ Pulling latest code"
            git pull origin main

            echo "→ Backing up database"
            docker compose exec -T server bun run server/scripts/backup-db.ts

            echo "→ Restarting containers"
            docker compose down
            docker compose up -d --build

            echo "→ Running migrations"
            docker compose exec -T server bun run drizzle-kit migrate

            echo "→ Smoke test"
            sleep 5
            curl -sf http://localhost:3003/api/health || (echo "Health check failed" && exit 1)

            echo "✓ Deploy complete"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 1,
              body: `❌ Deploy failed on ${new Date().toISOString()} — [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
