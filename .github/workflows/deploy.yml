name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/portfolio
            git pull origin main

            # Backup DB before taking anything down
            docker compose exec server bun run server/scripts/backup-db.ts || true

            docker compose down
            docker compose up -d --build

            # Wait for server healthcheck
            echo "Waiting for server..."
            for i in $(seq 1 12); do
              if docker compose exec server wget -qO- http://localhost:3001/api/health > /dev/null 2>&1; then
                echo "Server healthy."
                break
              fi
              echo "Attempt $i/12..."
              sleep 5
            done

            # Run DB migrations
            docker compose exec server bun run server/node_modules/.bin/drizzle-kit migrate

            # Final smoke test
            curl -sf http://localhost:3001/api/health || (echo "Health check failed" && exit 1)
            echo "Deploy complete."
