name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server deps
        run: cd server && bun install

      - name: Typecheck server
        run: cd server && bun run tsc --noEmit

      - name: Test shared/markdown
        run: bun test shared/markdown

      - name: Install web deps
        run: cd web && npm install

      - name: Typecheck web (Astro)
        run: cd web && npm run check

      - name: Build web
        run: cd web && npm run build
        env:
          VITE_API_URL: http://localhost:3001

      - name: Install admin deps
        run: cd admin-new && npm install --legacy-peer-deps

      - name: Sync admin types
        run: cd admin-new && npx svelte-kit sync

      - name: Typecheck admin
        run: cd admin-new && npx svelte-check --tsconfig ./tsconfig.json
