<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/images/favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="%sveltekit.assets%/images/favicon/favicon-96x96.png" />
    <link rel="icon" type="image/x-icon" href="%sveltekit.assets%/images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/images/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/images/favicon/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <script>if(localStorage.getItem('admin-theme')==='dark')document.documentElement.classList.add('dark')</script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
