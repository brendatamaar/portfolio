services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3003:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DB_PATH=${DB_PATH}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
    volumes:
      - ./server/data:/app/server/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  portfolio:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - API_INTERNAL_URL=${API_INTERNAL_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - server
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - API_INTERNAL_URL=${API_INTERNAL_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - server
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
