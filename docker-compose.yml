services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3003:3001"
    environment:
      - PORT=3001
      - CORS_ORIGINS=${CORS_ORIGINS}
      - UPLOADS_DIR=/app/server/uploads
    volumes:
      - ./server/data:/app/server/data
      - ./server/uploads:/app/server/uploads
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  portfolio:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - API_URL=${API_URL:-http://server:3001}
    depends_on:
      server:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost:3001}
    ports:
      - "3002:3000"
    environment:
      - API_URL=${API_URL:-http://server:3001}
    depends_on:
      server:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
