services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3003:3001"
    environment:
      - PORT=3001
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LIBRETRANSLATE_URL=${LIBRETRANSLATE_URL}
      - DB_PATH=${DB_PATH}
    volumes:
      - ./server/data:/app/dist/server/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - VITE_API_INTERNAL_URL=${VITE_API_INTERNAL_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - server
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "3002:80"
    depends_on:
      - server
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
